                                <span className="text-xs font-bold text-white">20×</span>
                            </button>
                            <button disabled={isAutoRunning || gameState === 'rolling'} onClick={() => setSelectedColor('black')} className={`py-3 rounded-lg flex flex-col items-center justify-center gap-1 transition-all border ${selectedColor === 'black' ? 'bg-[#2f2f35] border-[#4f4f56] ring-2 ring-[#4f4f56]' : 'bg-surface border-[#2f2f35] opacity-70 hover:opacity-100'}`}>
                                <div className="w-4 h-4 rounded-full bg-[#1c1c20] border border-gray-600 shadow-[0_0_10px_rgba(0,0,0,0.4)]"></div>
                                <span className="text-xs font-bold text-white">2×</span>
                            </button>
                        </div>

                        <div className="mt-auto pt-2">
                            {mode === 'manual' ? (
                                <Button variant="primary" onClick={() => executeRoll(betAmount, selectedColor)} disabled={betAmount > balance || betAmount <= 0 || gameState === 'rolling'} className="w-full py-4 text-sm">Bet</Button>
                            ) : (
                                isAutoRunning ? <Button variant="danger" onClick={stopAuto} className="w-full py-4 text-sm">Stop Auto</Button> : <Button variant="primary" onClick={startAuto} disabled={betAmount > balance || betAmount <= 0} className="w-full py-4 text-sm">Start Auto</Button>
                            )}
                        </div>
                    </div>

                    {/* Play Area */}
                    <div className="flex-1 flex flex-col items-center justify-center p-6 bg-panel rounded-xl border border-[#2a2a30] relative overflow-hidden shadow-2xl min-h-[450px]">
                        <div className="absolute inset-0 bg-gradient-to-b from-[#1a1a1f] to-[#121215] opacity-50 pointer-events-none"></div>

                        {/* Wheel Container */}
                        <div className="w-full max-w-2xl relative">
                            <div className="absolute top-0 bottom-0 left-1/2 w-1 bg-white z-30 transform -translate-x-1/2 pointer-events-none shadow-[0_0_15px_#ffffff]"></div>
                            <div className="absolute -top-3 left-1/2 w-0 h-0 border-l-[10px] border-r-[10px] border-t-[14px] border-l-transparent border-r-transparent border-t-white z-30 transform -translate-x-1/2 drop-shadow-[0_2px_5px_rgba(0,0,0,0.5)]"></div>
                            <div className="absolute -bottom-3 left-1/2 w-0 h-0 border-l-[10px] border-r-[10px] border-b-[14px] border-l-transparent border-r-transparent border-b-white z-30 transform -translate-x-1/2 drop-shadow-[0_-2px_5px_rgba(0,0,0,0.5)]"></div>

                            {/* Viewport (pl-[50%] aligns origin to exact center line) */}
                            <div className="w-full overflow-hidden bg-[#0d0d0f] border-y-2 border-[#2f2f35] py-4 rounded relative shadow-[inset_0_0_30px_rgba(0,0,0,0.8)] flex">
                                <div
                                    className="flex whitespace-nowrap will-change-transform pl-[50%]"
                                    style={{
                                        transform: `translateX(${wheelOffset}px)`,
                                        transition: transitionDuration > 0 ? `transform ${transitionDuration}s cubic-bezier(0.15, 0.8, 0.15, 1)` : 'none'
                                    }}
                                >
                                    {wheelTiles.map((type, idx) => (
                                        <div key={idx} className="flex-shrink-0 flex items-center justify-center" style={{ width: `${tileWidth}px` }}>
                                            <div className={`w-14 h-14 rounded-lg flex items-center justify-center ${getTileColorClass(type)}`}>
                                                {type === 'white' && <Icons.Diamond />}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Result Overlay */}
                        <div className="mt-12 h-16 flex items-center justify-center">
                            {gameState === 'won' && <div className="text-success text-3xl font-black uppercase tracking-widest drop-shadow-[0_0_15px_rgba(0,231,1,0.5)] animate-pop-in">You Won!</div>}
                            {gameState === 'lost' && <div className="text-danger text-3xl font-black uppercase tracking-widest opacity-80 animate-pop-in">Busted</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- DICE COMPONENT ---
        const DiceGame = ({ balance, updateBalance }) => {
            const [mode, setMode] = useState('manual');
            const [betAmount, setBetAmount] = useState(10);

            const [target, setTarget] = useState(50.50);
            const [condition, setCondition] = useState('over');

            const [multStr, setMultStr] = useState("1.9800");
            const [chanceStr, setChanceStr] = useState("50.00");

            const [lastRoll, setLastRoll] = useState(null);
            const [gameState, setGameState] = useState('idle');

            const [isAutoRunning, setIsAutoRunning] = useState(false);
            const [autoConfig, setAutoConfig] = useState({ numberOfBets: 0, onWin: 'reset', onWinValue: 100, onLoss: 'reset', onLossValue: 100 });
            const [autoState, setAutoState] = useState({ round: 0, currentBet: 10, betsMade: 0 });
            const isAutoRunningRef = useRef(false);

            useEffect(() => { if (!isAutoRunning) setAutoState(prev => ({ ...prev, currentBet: betAmount })); }, [betAmount, isAutoRunning]);

            const winChance = condition === 'over' ? (100 - target) : target;
            const multiplier = 99 / winChance;

            // Sync visual inputs when target changes internally via slider or condition switch
            useEffect(() => {
                setMultStr(multiplier.toFixed(4));
                setChanceStr(winChance.toFixed(2));
            }, [target, condition]);

            const handleSliderChange = (e) => {
                let val = parseFloat(e.target.value);
                if (val < 2.00) val = 2.00; if (val > 98.00) val = 98.00;
                setTarget(val);
            };

            const handleMultBlur = () => {
                let m = parseFloat(multStr);
                if (isNaN(m) || m < 1.0102) m = 1.0102;
                if (m > 99) m = 99;
                let newChance = 99 / m;
                setTarget(condition === 'over' ? (100 - newChance) : newChance);
                setMultStr(m.toFixed(4));
            };

            const handleChanceBlur = () => {
                let c = parseFloat(chanceStr);
                if (isNaN(c) || c < 1) c = 1.00;
                if (c > 98) c = 98.00;
                setTarget(condition === 'over' ? (100 - c) : c);
                setChanceStr(c.toFixed(2));
            };

            const switchCondition = () => { setCondition(prev => prev === 'over' ? 'under' : 'over'); setTarget(100 - target); };

            const executeRoll = (currentBetAmount) => {
                if (currentBetAmount > balance || currentBetAmount <= 0) return null;
                updateBalance(-currentBetAmount);

                const roll = parseFloat((Math.random() * 100).toFixed(2));
                setLastRoll(roll);

                const isWin = condition === 'over' ? roll > target : roll < target;
                if (isWin) {
                    playSound('win'); updateBalance(currentBetAmount * multiplier); setGameState('won'); return { win: true };
                } else {
                    playSound('lose'); setGameState('lost'); return { win: false };
                }
            };

            const startAuto = () => {
                if (betAmount > balance || betAmount <= 0) return;
                setIsAutoRunning(true); isAutoRunningRef.current = true;
                setAutoState({ round: 1, currentBet: betAmount, betsMade: 0 });
            };

            const stopAuto = () => { setIsAutoRunning(false); isAutoRunningRef.current = false; };

            useEffect(() => {
                if (!isAutoRunning) return;
                let isMounted = true;
                const executeAutoRound = async () => {
                    await new Promise(r => setTimeout(r, 400));
                    if (!isMounted || !isAutoRunningRef.current) return;
                    if ((autoConfig.numberOfBets > 0 && autoState.betsMade >= autoConfig.numberOfBets) || autoState.currentBet > balance) { stopAuto(); return; }

                    const result = executeRoll(autoState.currentBet);
                    if (!result) { stopAuto(); return; }

                    let nextBet = autoState.currentBet;
                    if (result.win) { if (autoConfig.onWin === 'increase') nextBet += (nextBet * (autoConfig.onWinValue / 100)); else nextBet = betAmount; }
                    else { if (autoConfig.onLoss === 'increase') nextBet += (nextBet * (autoConfig.onLossValue / 100)); else nextBet = betAmount; }
                    setAutoState(prev => ({ round: prev.round + 1, currentBet: nextBet, betsMade: prev.betsMade + 1 }));
                };
                executeAutoRound();
                return () => { isMounted = false; };
            }, [autoState.round, isAutoRunning]);

            const trackBg = useMemo(() => {
                const red = '#e11d48'; const white = '#ffffff'; const p = target;
                return condition === 'over' ? `linear-gradient(to right, ${red} ${p}%, ${white} ${p}%)` : `linear-gradient(to right, ${white} ${p}%, ${red} ${p}%)`;
            }, [target, condition]);

            return (
                <div className="flex flex-col lg:flex-row gap-6 animate-pop-in max-w-6xl mx-auto w-full">
                    {/* Sidebar */}
                    <div className="w-full lg:w-[340px] bg-panel rounded-xl p-5 border border-[#2a2a30] flex flex-col gap-5 shadow-2xl flex-shrink-0 z-10">
                        <div className="flex bg-surface rounded-md p-1">
                            <button disabled={isAutoRunning} onClick={() => setMode('manual')} className={`flex-1 py-1.5 text-sm font-semibold rounded transition-all ${mode === 'manual' ? 'bg-[#3f3f46] text-white shadow' : 'text-gray-400 hover:text-white disabled:opacity-50'}`}>Manual</button>
                            <button disabled={isAutoRunning} onClick={() => setMode('auto')} className={`flex-1 py-1.5 text-sm font-semibold rounded transition-all ${mode === 'auto' ? 'bg-[#3f3f46] text-white shadow' : 'text-gray-400 hover:text-white disabled:opacity-50'}`}>Auto</button>
                        </div>
                        <div className="flex flex-col gap-1.5">
                            <label className="text-subtitle text-xs font-semibold uppercase tracking-wider">Bet Amount</label>
                            <BetInput value={betAmount} onChange={setBetAmount} disabled={isAutoRunning} />
                        </div>
                        {mode === 'auto' && (
                            <div className="flex flex-col gap-4 border-t border-[#2f2f35] pt-4 animate-pop-in">
                                <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider flex justify-between">Number of Bets <span className="font-normal opacity-50">0 = ∞</span></label><input type="number" value={autoConfig.numberOfBets} onChange={e => setAutoConfig({...autoConfig, numberOfBets: Math.max(0, Number(e.target.value))})} disabled={isAutoRunning} className="w-full bg-surface border border-[#2f2f35] text-white rounded-lg px-3 py-2 focus:outline-none focus:border-[#4f4f56] transition-colors disabled:opacity-50 text-sm" /></div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider">On Win</label><div className="flex bg-surface rounded p-1 border border-[#2f2f35]"><button disabled={isAutoRunning} onClick={() => setAutoConfig({...autoConfig, onWin: 'reset'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onWin === 'reset' ? 'bg-[#3f3f46] text-white' : 'text-gray-500'}`}>Reset</button><button disabled={isAutoRunning} onClick={() => setAutoConfig({...autoConfig, onWin: 'increase'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onWin === 'increase' ? 'bg-[#3f3f46] text-white' : 'text-gray-500'}`}>Increase</button></div>{autoConfig.onWin === 'increase' && <input disabled={isAutoRunning} type="number" value={autoConfig.onWinValue} onChange={e => setAutoConfig({...autoConfig, onWinValue: Math.max(0, Number(e.target.value))})} className="w-full bg-surface border border-[#2f2f35] text-white rounded px-2 py-1.5 text-xs" />}</div>
                                    <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider">On Loss</label><div className="flex bg-surface rounded p-1 border border-[#2f2f35]"><button disabled={isAutoRunning} onClick={() => setAutoConfig({...autoConfig, onLoss: 'reset'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onLoss === 'reset' ? 'bg-[#3f3f46] text-white' : 'text-gray-500'}`}>Reset</button><button disabled={isAutoRunning} onClick={() => setAutoConfig({...autoConfig, onLoss: 'increase'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onLoss === 'increase' ? 'bg-[#3f3f46] text-white' : 'text-gray-500'}`}>Increase</button></div>{autoConfig.onLoss === 'increase' && <input disabled={isAutoRunning} type="number" value={autoConfig.onLossValue} onChange={e => setAutoConfig({...autoConfig, onLossValue: Math.max(0, Number(e.target.value))})} className="w-full bg-surface border border-[#2f2f35] text-white rounded px-2 py-1.5 text-xs" />}</div>
                                </div>
                            </div>
                        )}
                        <div className="mt-auto pt-2">
                            {mode === 'manual' ? <Button variant="primary" onClick={() => executeRoll(betAmount)} disabled={betAmount > balance || betAmount <= 0} className="w-full py-4 text-sm">Bet</Button> : (
                                isAutoRunning ? <Button variant="danger" onClick={stopAuto} className="w-full py-4 text-sm">Stop Auto</Button> : <Button variant="primary" onClick={startAuto} disabled={betAmount > balance || betAmount <= 0} className="w-full py-4 text-sm">Start Auto</Button>
                            )}
                        </div>
                    </div>
                    {/* Game Area */}
                    <div className="flex-1 flex flex-col items-center justify-center p-6 bg-panel rounded-xl border border-[#2a2a30] relative overflow-hidden shadow-2xl min-h-[450px]">
                        <div className="absolute top-10 w-full flex justify-center h-24 items-center">
                            {lastRoll !== null && (
                                <div key={Date.now()} className={`text-6xl font-black tracking-tighter animate-pop-in ${gameState === 'won' ? 'text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.5)]' : 'text-danger drop-shadow-[0_0_20px_rgba(225,29,72,0.5)]'}`}>{lastRoll.toFixed(2)}</div>
                            )}
                        </div>
                        <div className="w-full max-w-2xl mt-24 px-6 relative h-24 flex flex-col justify-center">
                            <div className="flex justify-between mb-6 text-subtitle font-bold text-sm px-2"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>
                            <div className="relative w-full">
                                <input type="range" min="0" max="100" step="0.01" value={target} onChange={handleSliderChange} disabled={isAutoRunning} className="dice-slider" style={{ '--track-bg': trackBg }} />
                                <div className="absolute top-[-36px] pointer-events-none transform -translate-x-1/2 flex flex-col items-center z-20" style={{ left: `calc(14px + (100% - 28px) * ${target / 100})` }}>
                                    <div className="bg-surface border border-[#2f2f35] text-white text-xs font-bold px-3 py-1.5 rounded shadow-lg whitespace-nowrap">{target.toFixed(2)}</div>
                                    <div className="w-2 h-2 bg-surface border-r border-b border-[#2f2f35] transform rotate-45 -mt-1.5"></div>
                                </div>
                                {lastRoll !== null && (
                                    <div className="absolute top-[6px] pointer-events-none transform -translate-x-1/2 -translate-y-1/2 z-30 transition-all duration-500 ease-out flex flex-col items-center" style={{ left: `calc(14px + (100% - 28px) * ${lastRoll / 100})` }}>
                                        <div className={`w-6 h-6 rounded-full border-[3px] shadow-[0_0_15px_rgba(0,0,0,0.8)] flex items-center justify-center ${gameState === 'won' ? 'bg-white border-white text-black' : 'bg-[#0d0d0f] border-danger text-danger'}`}>
                                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">{gameState === 'won' ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7" /> : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M6 18L18 6M6 6l12 12" />}</svg>
                                        </div>
                                        <div className={`mt-2 px-2 py-0.5 rounded text-[10px] font-bold shadow-lg ${gameState === 'won' ? 'bg-white text-black' : 'bg-danger text-white'}`}>{lastRoll.toFixed(2)}</div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="w-full max-w-2xl bg-surface border border-[#2f2f35] rounded-xl p-4 mt-12 grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="flex flex-col gap-1 text-center bg-[#1c1c20] p-3 rounded border border-[#2f2f35]">
                                <label className="text-subtitle text-xs uppercase font-bold tracking-wider">Multiplier</label>
                                <input type="text" value={multStr} onChange={(e)=>setMultStr(e.target.value)} onBlur={handleMultBlur} disabled={isAutoRunning} className="bg-transparent text-white font-mono font-bold text-lg text-center w-full focus:outline-none" />
                            </div>
                            <div className="flex flex-col gap-1 text-center bg-[#1c1c20] p-3 rounded border border-[#2f2f35]">
                                <label className="text-subtitle text-xs uppercase font-bold tracking-wider">Roll {condition}</label>
                                <button disabled={isAutoRunning} onClick={switchCondition} className="bg-transparent text-white font-mono font-bold text-lg w-full focus:outline-none flex items-center justify-center gap-2 hover:text-danger transition">
                                    {target.toFixed(2)} <svg className="w-4 h-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                                </button>
                            </div>
                            <div className="flex flex-col gap-1 text-center bg-[#1c1c20] p-3 rounded border border-[#2f2f35]">
                                <label className="text-subtitle text-xs uppercase font-bold tracking-wider">Win Chance</label>
                                <div className="flex items-center justify-center relative w-full">
                                    <input type="text" value={chanceStr} onChange={(e)=>setChanceStr(e.target.value)} onBlur={handleChanceBlur} disabled={isAutoRunning} className="bg-transparent text-white font-mono font-bold text-lg text-center w-full focus:outline-none pr-4" />
                                    <span className="absolute right-4 text-subtitle font-bold">%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MINES COMPONENT ---
        const calculateCombinations = (n, k) => { if(k<0||k>n)return 0;if(k===0||k===n)return 1;let r=1;for(let i=1;i<=k;i++)r=r*(n-i+1)/i;return r; };
        const calculateMinesMultiplier = (m, r) => r===0 ? 1 : (calculateCombinations(25,m)/calculateCombinations(25-r,m))*0.99;

        const MinesGame = ({ balance, updateBalance }) => {
            const [mode, setMode] = useState('manual'); const [betAmount, setBetAmount] = useState(10); const [mineCount, setMineCount] = useState(3);
            const [gameState, setGameState] = useState('idle'); const [board, setBoard] = useState(Array(25).fill({ isMine: false, isRevealed: false }));
            const [revealedSafeCount, setRevealedSafeCount] = useState(0); const [winData, setWinData] = useState(null);
            const [autoSelectedTiles, setAutoSelectedTiles] = useState([]); const [isAutoRunning, setIsAutoRunning] = useState(false);
            const [autoConfig, setAutoConfig] = useState({ numberOfBets: 0, onWin: 'reset', onWinValue: 100, onLoss: 'reset', onLossValue: 100 });
            const [autoState, setAutoState] = useState({ round: 0, currentBet: 10, betsMade: 0 }); const isAutoRunningRef = useRef(false);

            useEffect(() => { if (!isAutoRunning) setAutoState(prev => ({ ...prev, currentBet: betAmount })); }, [betAmount, isAutoRunning]);
            const currentMultiplier = useMemo(() => calculateMinesMultiplier(mineCount, revealedSafeCount), [mineCount, revealedSafeCount]);
            const nextMultiplier = useMemo(() => calculateMinesMultiplier(mineCount, revealedSafeCount + 1), [mineCount, revealedSafeCount]);

            const handleModeSwitch = (m) => { if (gameState === 'playing' || isAutoRunning) return; setMode(m); setGameState('idle'); setBoard(Array(25).fill({ isMine: false, isRevealed: false })); setRevealedSafeCount(0); setWinData(null); };
            const startGame = () => { if (betAmount>balance||betAmount<=0||mineCount<1||mineCount>24) return; updateBalance(-betAmount); setGameState('playing'); setRevealedSafeCount(0); setWinData(null); let nb = Array(25).fill({ isMine: false, isRevealed: false }); let mp=0; while(mp<mineCount){ let ri=Math.floor(Math.random()*25); if(!nb[ri].isMine){ nb[ri]={isMine:true,isRevealed:false}; mp++; } } setBoard(nb); };
            const handleTileClick = (index) => {
                if(mode==='auto'){ if(isAutoRunning)return; if(autoSelectedTiles.includes(index))setAutoSelectedTiles(autoSelectedTiles.filter(i=>i!==index)); else if(autoSelectedTiles.length<25-mineCount)setAutoSelectedTiles([...autoSelectedTiles,index]); return; }
                if(gameState!=='playing'||board[index].isRevealed)return;
                let nb=[...board]; nb[index]={...nb[index],isRevealed:true};
                if(nb[index].isMine){ playSound('lose'); setGameState('lost'); setBoard(nb.map((t,i)=>({...t,isRevealed:t.isMine?true:t.isRevealed,exploded:i===index}))); }
                else { let nsc=revealedSafeCount+1; setRevealedSafeCount(nsc); setBoard(nb); if(nsc===25-mineCount)handleCashout(nb,nsc); }
            };
            const handleCashout = (cb=board, csc=revealedSafeCount) => { if(gameState!=='playing'||csc===0)return; playSound('win'); let fm=calculateMinesMultiplier(mineCount,csc); let wa=betAmount*fm; updateBalance(wa); setGameState('won'); setWinData({payout:wa,multiplier:fm}); setBoard(cb.map(t=>({...t,isRevealed:true,dimmed:!t.isRevealed}))); };
            const startAuto = () => { if(autoSelectedTiles.length===0||betAmount>balance||betAmount<=0)return; setIsAutoRunning(true); isAutoRunningRef.current=true; setAutoState({round:1,currentBet:betAmount,betsMade:0}); setWinData(null); };
            const stopAuto = () => { setIsAutoRunning(false); isAutoRunningRef.current=false; setGameState('idle'); };

            useEffect(() => {
                if(!isAutoRunning)return; let isMounted=true;
                const er=async()=>{
                    await new Promise(r=>setTimeout(r,200)); if(!isMounted||!isAutoRunningRef.current)return;
                    if((autoConfig.numberOfBets>0&&autoState.betsMade>=autoConfig.numberOfBets)||autoState.currentBet>balance){ stopAuto(); return; }
                    updateBalance(-autoState.currentBet); setGameState('playing'); setWinData(null); let nb=Array(25).fill({isMine:false,isRevealed:false}); let mp=0; while(mp<mineCount){ let ri=Math.floor(Math.random()*25); if(!nb[ri].isMine){nb[ri]={isMine:true,isRevealed:false};mp++;} } setBoard(nb);
                    await new Promise(r=>setTimeout(r,300)); if(!isMounted||!isAutoRunningRef.current)return;
                    let hm=false; let tb=[...nb];
                    for(let i=0;i<autoSelectedTiles.length;i++){ let idx=autoSelectedTiles[i]; tb[idx]={...tb[idx],isRevealed:true}; setBoard([...tb]); if(tb[idx].isMine){hm=true;tb[idx].exploded=true;break;} await new Promise(r=>setTimeout(r,100)); if(!isMounted||!isAutoRunningRef.current)return; }
                    if(hm){
                        playSound('lose'); setBoard(tb.map(t=>({...t,isRevealed:t.isMine?true:t.isRevealed,dimmed:!t.isRevealed&&!t.isMine}))); setGameState('lost'); await new Promise(r=>setTimeout(r,1000)); if(!isMounted||!isAutoRunningRef.current)return;
                        let nBet=autoState.currentBet; if(autoConfig.onLoss==='increase')nBet+=(nBet*(autoConfig.onLossValue/100)); else nBet=betAmount; setAutoState(p=>({round:p.round+1,currentBet:nBet,betsMade:p.betsMade+1}));
                    } else {
                        playSound('win'); let fm=calculateMinesMultiplier(mineCount,autoSelectedTiles.length); let wa=autoState.currentBet*fm; updateBalance(wa); setGameState('won'); setWinData({payout:wa,multiplier:fm}); setBoard(tb.map(t=>({...t,isRevealed:true,dimmed:!t.isRevealed}))); await new Promise(r=>setTimeout(r,1000)); if(!isMounted||!isAutoRunningRef.current)return;
                        let nBet=autoState.currentBet; if(autoConfig.onWin==='increase')nBet+=(nBet*(autoConfig.onWinValue/100)); else nBet=betAmount; setAutoState(p=>({round:p.round+1,currentBet:nBet,betsMade:p.betsMade+1}));
                    }
                }; er(); return()=>{isMounted=false;};
            }, [autoState.round, isAutoRunning]);

            return (
                <div className="flex flex-col lg:flex-row gap-6 animate-pop-in max-w-6xl mx-auto w-full">
                    <div className="w-full lg:w-[340px] bg-panel rounded-xl p-5 border border-[#2a2a30] flex flex-col gap-5 shadow-2xl flex-shrink-0 z-10">
                        <div className="flex bg-surface rounded-md p-1"><button disabled={isAutoRunning||gameState==='playing'} onClick={()=>handleModeSwitch('manual')} className={`flex-1 py-1.5 text-sm font-semibold rounded ${mode==='manual'?'bg-[#3f3f46] text-white':'text-gray-400'}`}>Manual</button><button disabled={isAutoRunning||gameState==='playing'} onClick={()=>handleModeSwitch('auto')} className={`flex-1 py-1.5 text-sm font-semibold rounded ${mode==='auto'?'bg-[#3f3f46] text-white':'text-gray-400'}`}>Auto</button></div>
                        <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider">Bet Amount</label><BetInput value={betAmount} onChange={setBetAmount} disabled={gameState==='playing'||isAutoRunning} /></div>
                        <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider">Mines</label><select value={mineCount} onChange={(e)=>{setMineCount(Number(e.target.value));setAutoSelectedTiles([]);}} disabled={gameState==='playing'||isAutoRunning} className="bg-surface border border-[#2f2f35] text-white rounded-lg px-3 py-2.5 focus:outline-none text-sm font-medium">{[...Array(24)].map((_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}</select></div>
                        {mode==='auto'&&(
                            <div className="flex flex-col gap-4 border-t border-[#2f2f35] pt-4"><div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase flex justify-between">Bets (0=∞)</label><input type="number" value={autoConfig.numberOfBets} onChange={e=>setAutoConfig({...autoConfig,numberOfBets:Math.max(0,Number(e.target.value))})} disabled={isAutoRunning} className="bg-surface border border-[#2f2f35] text-white rounded-lg px-3 py-2 text-sm"/></div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider">On Win</label><div className="flex bg-surface rounded p-1 border border-[#2f2f35]"><button disabled={isAutoRunning} onClick={()=>setAutoConfig({...autoConfig,onWin:'reset'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onWin==='reset'?'bg-[#3f3f46] text-white':'text-gray-500'}`}>Reset</button><button disabled={isAutoRunning} onClick={()=>setAutoConfig({...autoConfig,onWin:'increase'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onWin==='increase'?'bg-[#3f3f46] text-white':'text-gray-500'}`}>Increase</button></div>{autoConfig.onWin==='increase'&&<input type="number" value={autoConfig.onWinValue} onChange={e=>setAutoConfig({...autoConfig,onWinValue:Math.max(0,Number(e.target.value))})} disabled={isAutoRunning} className="bg-surface border border-[#2f2f35] text-white rounded px-2 py-1.5 text-xs"/>}</div>
                                <div className="flex flex-col gap-1.5"><label className="text-subtitle text-xs font-semibold uppercase tracking-wider">On Loss</label><div className="flex bg-surface rounded p-1 border border-[#2f2f35]"><button disabled={isAutoRunning} onClick={()=>setAutoConfig({...autoConfig,onLoss:'reset'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onLoss==='reset'?'bg-[#3f3f46] text-white':'text-gray-500'}`}>Reset</button><button disabled={isAutoRunning} onClick={()=>setAutoConfig({...autoConfig,onLoss:'increase'})} className={`flex-1 py-1 text-xs font-bold rounded ${autoConfig.onLoss==='increase'?'bg-[#3f3f46] text-white':'text-gray-500'}`}>Increase</button></div>{autoConfig.onLoss==='increase'&&<input type="number" value={autoConfig.onLossValue} onChange={e=>setAutoConfig({...autoConfig,onLossValue:Math.max(0,Number(e.target.value))})} disabled={isAutoRunning} className="bg-surface border border-[#2f2f35] text-white rounded px-2 py-1.5 text-xs"/>}</div>
                            </div></div>
                        )}
                        <div className="mt-auto pt-2">{mode==='manual'?(gameState==='playing'?<Button variant="success" onClick={()=>handleCashout()} disabled={revealedSafeCount===0} className="w-full py-4 text-sm">Cash Out ({formatCurrency(betAmount*currentMultiplier)})</Button>:<Button variant="primary" onClick={startGame} disabled={betAmount>balance||betAmount<=0} className="w-full py-4 text-sm">Bet</Button>):(isAutoRunning?<Button variant="danger" onClick={stopAuto} className="w-full py-4 text-sm">Stop Auto</Button>:<Button variant="primary" onClick={startAuto} disabled={betAmount>balance||betAmount<=0||autoSelectedTiles.length===0} className="w-full py-4 text-sm">Start Auto</Button>)}</div>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center p-6 bg-panel rounded-xl border border-[#2a2a30] relative overflow-hidden shadow-2xl min-h-[400px]">
                        <div className="absolute top-4 left-4 right-4 flex justify-between items-center z-10 px-4 py-2 bg-surface/50 rounded-lg border border-[#2f2f35] backdrop-blur">
                            {mode==='manual'?<><div className="text-xs font-semibold text-subtitle">Mult: <span className="text-white font-mono">{currentMultiplier.toFixed(2)}×</span></div><div className="text-xs font-semibold text-subtitle">Next: <span className="text-success font-mono">{nextMultiplier.toFixed(2)}×</span></div></>:<div className="text-xs font-semibold text-subtitle text-center w-full">Target: <span className="text-success font-mono">{calculateMinesMultiplier(mineCount,autoSelectedTiles.length).toFixed(2)}×</span></div>}
                        </div>
                        {gameState==='won'&&mode==='manual'&&winData&&<div className="absolute inset-0 z-30 flex flex-col items-center justify-center glass-panel animate-pop-in"><div className="text-success text-7xl font-black drop-shadow-[0_0_30px_rgba(0,231,1,0.6)] mb-4">{winData.multiplier.toFixed(2)}×</div><div className="bg-[#0d0d0f] border-2 border-success/30 text-white px-8 py-3 rounded-full font-bold text-xl flex items-center gap-2"><span className="text-success text-sm">Payout</span> ${formatCurrency(winData.payout)}</div></div>}
                        {gameState==='won'&&mode==='auto'&&winData&&<div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 bg-success text-black px-4 py-1 rounded shadow-[0_0_20px_rgba(0,231,1,0.5)] font-black text-sm animate-scale-up">{winData.multiplier.toFixed(2)}×</div>}
                        {gameState==='lost'&&<div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 bg-danger text-white px-4 py-1 rounded shadow-[0_0_20px_rgba(225,29,72,0.5)] font-black text-sm animate-scale-up">BUSTED</div>}
                        <div className="grid grid-cols-5 gap-2.5 sm:gap-3 w-full max-w-[420px] aspect-square z-10 mt-10">
                            {board.map((tile, i)=>{
                                let ic=(mode==='manual'&&gameState==='playing'&&!tile.isRevealed)||(mode==='auto'&&!isAutoRunning); let is=mode==='auto'&&autoSelectedTiles.includes(i);
                                let tc="rounded-lg cursor-pointer relative overflow-hidden flex items-center justify-center transition-all duration-300 ";
                                if(!tile.isRevealed){ tc+="tile-gradient "; if(ic)tc+="hover:bg-[#34343a] "; if(is&&!isAutoRunning)tc+="ring-2 ring-danger border-none shadow-[0_0_15px_rgba(225,29,72,0.3)] "; else if(is&&isAutoRunning)tc+="ring-2 ring-danger/40 border-none "; }
                                else { if(tile.isMine)tc+="tile-revealed-mine "+(!tile.exploded?"opacity-40 ":""); else tc+="tile-revealed-safe "+(tile.dimmed?"opacity-30 ":""); tc+="cursor-default "; }
                                return (
                                    <div key={i} className={tc} onClick={()=>handleTileClick(i)}>{!tile.isRevealed&&ic&&<div className="absolute inset-0 bg-white opacity-0 hover:opacity-5 transition-opacity"></div>}{tile.isRevealed&&<div className="w-full h-full flex items-center justify-center animate-pop-in">{tile.isMine?<Icons.Bomb explode={tile.exploded}/>:<Icons.Diamond/>}</div>}{is&&!tile.isRevealed&&<div className="absolute inset-0 flex items-center justify-center pointer-events-none"><div className="w-2.5 h-2.5 bg-danger rounded-full shadow-[0_0_8px_#e11d48]"></div></div>}</div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- App Component ---
        const App = () => {
            const [view, setView] = useState('menu');
            const [balance, setBalance] = useState(1000.00);

            // Banking
            const [modal, setModal] = useState(null);
            const [bankingAmount, setBankingAmount] = useState("100");
            const [isProcessing, setIsProcessing] = useState(false);
            const [bankingMessage, setBankingMessage] = useState(null);

            const updateBalance = (amount) => setBalance(prev => prev + amount);

            const games = [
                { id: 'mines', name: 'Mines', desc: 'Find gems, avoid bombs.', Icon: Icons.MenuMines, active: true },
                { id: 'dice', name: 'Dice', desc: 'Roll the odds.', Icon: Icons.MenuDice, active: true },
                { id: 'crash', name: 'Crash', desc: 'Cash out before the crash!', Icon: Icons.MenuCrash, active: true },
                { id: 'limbo', name: 'Limbo', desc: 'Hit the target multiplier.', Icon: Icons.MenuLimbo, active: true },
                { id: 'roulette', name: 'Roulette', desc: 'Spin the colors.', Icon: Icons.MenuRoulette, active: true },
            ];

            const handleBanking = (e) => {
                e.preventDefault();
                setIsProcessing(true); setBankingMessage(null);
                const amt = parseFloat(bankingAmount);
                if (isNaN(amt) || amt <= 0) { setIsProcessing(false); return; }

                setTimeout(() => {
                    setIsProcessing(false);
                    if (modal === 'deposit') { updateBalance(amt); setBankingMessage('Deposit Complete!'); }
                    else if (modal === 'withdraw') { if (balance >= amt) { updateBalance(-amt); setBankingMessage('Withdrawal Complete!'); } else { setBankingMessage('Insufficient funds.'); } }
                    setTimeout(() => { setModal(null); setBankingMessage(null); }, 1500);
                }, 1000);
            };

            return (
                <div className="min-h-screen flex flex-col selection:bg-danger/30">
                    {/* Modals */}
                    {modal && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center animate-pop-in backdrop-blur-sm p-4">
                            <div className="bg-[#161619] border border-[#2f2f35] w-full max-w-md rounded-2xl p-6 shadow-2xl relative">
                                <button onClick={() => !isProcessing && setModal(null)} className="absolute top-4 right-4 text-gray-500 hover:text-white transition"><Icons.Close /></button>
                                <h3 className="text-2xl font-black mb-6 uppercase tracking-wider">{modal}</h3>
                                {bankingMessage ? (
                                    <div className={`p-4 rounded-lg text-center font-bold ${bankingMessage.includes('Complete') ? 'bg-success/20 text-success border border-success/30' : 'bg-danger/20 text-danger border border-danger/30'} animate-pop-in`}>{bankingMessage}</div>
                                ) : (
                                    <form onSubmit={handleBanking} className="flex flex-col gap-5">
                                        <div className="flex flex-col gap-2"><label className="text-subtitle text-xs uppercase font-bold">Amount ($)</label><input type="number" min="1" step="0.01" required value={bankingAmount} onChange={e => setBankingAmount(e.target.value)} className="bg-surface border border-[#2f2f35] text-white rounded p-3 focus:outline-none focus:border-danger transition" /></div>
                                        <div className="flex flex-col gap-2"><label className="text-subtitle text-xs uppercase font-bold">Payment Method</label><select className="bg-surface border border-[#2f2f35] text-white rounded p-3 focus:outline-none focus:border-danger transition appearance-none"><option>Bitcoin (BTC)</option><option>Ethereum (ETH)</option><option>Credit Card (Visa/MC)</option></select></div>
                                        {modal === 'withdraw' && <div className="flex flex-col gap-2"><label className="text-subtitle text-xs uppercase font-bold">Destination Address</label><input type="text" required placeholder="Wallet address or Card details" className="bg-surface border border-[#2f2f35] text-white rounded p-3 focus:outline-none focus:border-danger transition" /></div>}
                                        <Button type="submit" disabled={isProcessing} className="mt-2 w-full">{isProcessing ? 'Processing...' : `Confirm ${modal === 'deposit' ? 'Deposit' : 'Withdrawal'}`}</Button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-[#0d0d0f] border-b border-[#1c1c20] sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-[72px] flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setView('menu')}>
                                <div className="w-8 h-8 rounded bg-danger flex items-center justify-center text-white font-black text-xl shadow-[0_0_15px_rgba(225,29,72,0.4)]">S</div>
                                <h1 className="text-xl font-black tracking-tight text-white hidden sm:block">Shiny<span className="text-danger">Games</span></h1>
                            </div>

                            <div className="flex items-center gap-2 sm:gap-4">
                                <div className="bg-surface border border-[#2f2f35] rounded px-3 sm:px-4 py-1.5 flex items-center gap-2 shadow-inner">
                                    <span className="text-success font-bold text-sm">$</span>
                                    <span className="font-mono font-bold text-white text-sm tracking-wide">{formatCurrency(balance)}</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setModal('deposit')} className="bg-success text-black text-xs font-bold px-3 py-1.5 rounded hover:bg-[#00c901] transition-colors shadow-[0_0_10px_rgba(0,231,1,0.2)]">Deposit</button>
                                    <button onClick={() => setModal('withdraw')} className="bg-surface text-white border border-[#2f2f35] text-xs font-bold px-3 py-1.5 rounded hover:bg-[#2f2f35] transition-colors flex items-center gap-1"><Icons.Wallet /> <span className="hidden sm:inline">Withdraw</span></button>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 relative flex flex-col">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-danger opacity-[0.03] rounded-full blur-[100px] pointer-events-none"></div>
                        <div className="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-[#26262b] opacity-20 rounded-full blur-[150px] pointer-events-none"></div>

                        {view === 'menu' && (
                            <div className="animate-pop-in relative z-10 w-full flex-1 flex flex-col justify-center">
                                <div className="text-center mb-12 sm:mb-16 max-w-3xl mx-auto">
                                    <h2 className="text-5xl md:text-7xl font-black mb-6 tracking-tight text-white drop-shadow-md">
                                        Casino <span className="text-transparent bg-clip-text bg-gradient-to-r from-danger to-rose-400">Originals</span>
                                    </h2>
                                    <p className="text-subtitle text-lg md:text-xl font-medium">Secure platforms & probability logic.</p>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 sm:gap-6 relative z-10 w-full max-w-6xl mx-auto">
                                    {games.map(game => (
                                        <div key={game.id} onClick={() => { if(game.active) setView(game.id); }} className={`rounded-2xl bg-panel border border-[#26262b] ${game.active ? 'cursor-pointer group hover:border-[#3f3f46] hover:bg-[#1c1c20]' : 'opacity-60 cursor-not-allowed'} transition-all duration-300 hover:-translate-y-2 shadow-xl`}>
                                            <div className="p-6 md:p-8 flex flex-col items-center text-center gap-4 md:gap-6 relative overflow-hidden h-full">
                                                <div className="w-20 h-20 sm:w-28 sm:h-28 rounded-full bg-[#0d0d0f] border border-[#26262b] flex items-center justify-center relative group-hover:shadow-[0_0_30px_rgba(225,29,72,0.15)] transition-all">
                                                    <game.Icon />
                                                </div>
                                                <div className="flex flex-col gap-2 mt-2">
                                                    <h3 className="text-lg sm:text-xl font-bold tracking-tight text-white">{game.name}</h3>
                                                </div>
                                                <div className="mt-auto pt-4 w-full">
                                                    {!game.active ? (
                                                        <span className="inline-block px-4 py-1.5 bg-surface text-subtitle border border-[#2f2f35] text-xs font-bold uppercase tracking-wider rounded">Soon</span>
                                                    ) : (
                                                        <div className="w-full py-2.5 bg-danger/10 text-danger border border-danger/20 font-bold rounded text-sm group-hover:bg-danger group-hover:text-white transition-colors">Play</div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {['mines', 'dice', 'crash', 'limbo', 'roulette'].includes(view) && (
                            <div className="w-full flex flex-col">
                                <div className="w-full flex items-center justify-start max-w-6xl mx-auto mb-4 relative z-20">
                                    <button onClick={() => setView('menu')} className="bg-surface border border-[#2f2f35] px-4 py-2 rounded-lg text-gray-400 hover:text-white hover:border-[#4f4f56] text-sm font-bold flex items-center gap-2 transition-colors shadow-lg">
                                        &larr; Back to Lobby
                                    </button>
                                </div>
                                {view === 'mines' && <MinesGame balance={balance} updateBalance={updateBalance} />}
                                {view === 'dice' && <DiceGame balance={balance} updateBalance={updateBalance} />}
                                {view === 'crash' && <CrashGame balance={balance} updateBalance={updateBalance} />}
                                {view === 'limbo' && <LimboGame balance={balance} updateBalance={updateBalance} />}
                                {view === 'roulette' && <RouletteGame balance={balance} updateBalance={updateBalance} />}
                            </div>
                        )}

                    </main>

                    <footer className="border-t border-[#1c1c20] py-6 text-center text-subtitle text-xs z-10 bg-[#0d0d0f] font-medium tracking-wide">
                        <p>18+ | Play Responsibly | Created by SANIYAT MAHMUD</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
